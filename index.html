<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveStream Pro</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-theme">
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fab fa-youtube" style="color:#ff0000;"></i>
                <span>LiveStream Pro</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="#" class="nav-item" data-view="upload"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="#" class="nav-item" data-view="live"><i class="fas fa-video"></i> Live Control</a>
                <a href="#" class="nav-item" data-view="playlists"><i class="fas fa-list"></i> Playlists</a>
                <a href="#" class="nav-item" data-view="history"><i class="fas fa-history"></i> History</a>
                <a href="#" class="nav-item" data-view="analytics"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="#" class="nav-item" data-view="settings"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="navbar">
                <div class="navbar-left">
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="navbar-right">
                    <div class="speed-meter">
                        <i class="fas fa-wifi"></i>
                        <span id="internetSpeed">0 Mbps</span>
                    </div>
                    <div class="stream-status" id="globalStreamStatus">
                        <span class="status-dot offline"></span>
                        <span>Offline</span>
                    </div>
                    <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                    <div class="profile-icon">
                        <i class="fas fa-user-circle animated-logo"></i>
                    </div>
                </div>
            </header>

            <!-- Dynamic Views (same content as previous, but I'll keep it concise) -->
            <div class="content-view active" id="view-dashboard">...</div>
            <div class="content-view" id="view-upload">...</div>
            <div class="content-view" id="view-live">...</div>
            <div class="content-view" id="view-playlists">...</div>
            <div class="content-view" id="view-history">...</div>
            <div class="content-view" id="view-analytics">...</div>
            <div class="content-view" id="view-settings">...</div>

            <footer class="app-footer">
                <p>© 2026 LiveStream Pro. Designed by Bright Dumashie.</p>
            </footer>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
